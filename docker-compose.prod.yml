# Safer local override — bind services to loopback only (not 0.0.0.0).
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# For public web-server deployment, use docker-compose.distribution.yml instead.

services:
  backend:
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-5001}:5000"
  chroma:
    ports:
      - "127.0.0.1:${CHROMA_HOST_PORT:-8001}:8000"
  frontend:
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-3000}:80"