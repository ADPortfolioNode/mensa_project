worker_processes 1;
pid /var/run/nginx/nginx.pid;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=ingest_limit:10m rate=20r/s;
  limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

  # Hide nginx version
  server_tokens off;

  # Client body size
  client_max_body_size 10m;

  # Logging format
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Backend API proxy
    location /api/ {
      proxy_pass http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 30s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;
      send_timeout 300s;
      proxy_intercept_errors on;
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;

      # Rate limiting for general API
      limit_req zone=api_limit burst=50 nodelay;
    }

    # Specific API endpoints with tight timeouts for fast feedback
    location = /api/startup_status {
      proxy_pass http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_intercept_errors on;
      error_page 502 503 504 = /__fallback_startup_status;
    }

    location = /api/experiments {
      proxy_pass http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_intercept_errors on;
      error_page 502 503 504 = /__fallback_experiments;
    }

    location = /api/ingest {
      proxy_pass http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 30s;
      proxy_send_timeout 3600s;
      proxy_read_timeout 3600s;
      send_timeout 3600s;

      # Strict rate limiting for ingestion
      limit_req zone=ingest_limit burst=10 nodelay;
    }

    location = /api/health {
      access_log off;
      proxy_pass http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_connect_timeout 3s;
      proxy_read_timeout 5s;
    }

    # Fallback endpoints for proxy errors
    location = /__fallback_startup_status {
      internal;
      default_type application/json;
      return 200 '{"status":"pending","progress":0,"total":1,"games":{},"current_game":null,"elapsed_s":0}';
    }

    location = /__fallback_experiments {
      internal;
      default_type application/json;
      return 200 '{"experiments":[]}';
    }

    # Static files with caching
    location /static/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location / {
      try_files $uri /index.html;
      add_header Cache-Control "no-cache, must-revalidate";
    }

    # Deny access to hidden files
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }

    # Deny access to sensitive paths
    location ~ (\.env|\.git|composer\.json|package\.json|yarn\.lock)$ {
      deny all;
      access_log off;
      log_not_found off;
    }
  }
}
