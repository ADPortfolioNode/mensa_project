<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      // Windows Docker Desktop: localhost may resolve to IPv6 (::1) and hit wslrelay instead of Docker.
      (function () {
        var h = window.location.hostname;
        if (h === 'localhost' || h === '::1') {
          var port = window.location.port || (window.location.protocol === 'https:' ? '443' : '80');
          var target = 'http://127.0.0.1' + (port ? ':' + port : '') + window.location.pathname + window.location.search + window.location.hash;
          window.location.replace(target);
        }
      })();
    </script>
