# =============================================================================
# Mensa — Production distribution stack (web server / subscribing customers)
# =============================================================================
# Uses pre-built images from GHCR (or your registry). Backend + Chroma stay on
# the internal network; only Caddy (HTTPS) or frontend (direct) is published.
#
# Quick start:
#   cp .env.production.example .env
#   # edit .env — set DOMAIN, ACME_EMAIL, API keys
#   ./scripts/deploy-production.sh
#
# With TLS + subscriber basic auth:
#   CADDY_PROFILE=subscribers ./scripts/deploy-production.sh
# =============================================================================

name: mensa

x-backend-environment: &backend-environment
  DATA_DIR: /data
  CHROMA_SDK_ENABLED: "1"
  CHROMA_HOST: mensa_chroma
  CHROMA_PORT: "8000"
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  CHAT_GPT_API_KEY: ${CHAT_GPT_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GROK_API_KEY: ${GROK_API_KEY:-}
  GROK_API_BASE: ${GROK_API_BASE:-https://api.x.ai/v1}
  GROK_MODEL: ${GROK_MODEL:-grok-3-mini-beta}
  MAX_CONCURRENT_CLONES: ${MAX_CONCURRENT_CLONES:-3}
  INGEST_BATCH_SIZE: ${INGEST_BATCH_SIZE:-6000}
  INGEST_REQUEST_TIMEOUT: ${INGEST_REQUEST_TIMEOUT:-30}
  INGEST_MAX_RETRIES: ${INGEST_MAX_RETRIES:-3}
  INGEST_RETRY_DELAY: ${INGEST_RETRY_DELAY:-1}
  INGEST_BATCH_MAX_RETRIES: ${INGEST_BATCH_MAX_RETRIES:-2}
  INGEST_PROGRESS_INTERVAL_S: ${INGEST_PROGRESS_INTERVAL_S:-0.5}
  INGEST_STATE_SAVE_INTERVAL_S: ${INGEST_STATE_SAVE_INTERVAL_S:-2}
  INGEST_STARTUP_COUNT_WORKERS: ${INGEST_STARTUP_COUNT_WORKERS:-4}
  INGEST_STARTUP_PARALLEL: ${INGEST_STARTUP_PARALLEL:-1}
  INGEST_ENABLE_CATALOG_FALLBACK: ${INGEST_ENABLE_CATALOG_FALLBACK:-0}
  INGEST_MAX_CATALOG_CANDIDATES: ${INGEST_MAX_CATALOG_CANDIDATES:-3}
  INGEST_SKIP_FETCH_THRESHOLD: ${INGEST_SKIP_FETCH_THRESHOLD:-50000}
  INGEST_FAST_COMPLETE_POPULATED: ${INGEST_FAST_COMPLETE_POPULATED:-1}
  TRAIN_TARGET_ACCURACY: ${TRAIN_TARGET_ACCURACY:-0.90}
  TRAIN_MAX_ATTEMPTS: ${TRAIN_MAX_ATTEMPTS:-40}
  TRAIN_SIZE: ${TRAIN_SIZE:-0.25}
  TRAIN_N_ESTIMATORS: ${TRAIN_N_ESTIMATORS:-250}
  TRAIN_MAX_DEPTH: ${TRAIN_MAX_DEPTH:-18}
  TRAIN_RANDOM_STATE: ${TRAIN_RANDOM_STATE:-42}
  TRAIN_BLEND_STEP: ${TRAIN_BLEND_STEP:-0.05}
  TRAIN_DATA_LIMIT: ${TRAIN_DATA_LIMIT:-0}
  TRAIN_WINDOW_SIZE: ${TRAIN_WINDOW_SIZE:-3}
  TRAIN_AUTO_TUNE: ${TRAIN_AUTO_TUNE:-1}

services:
  backend:
    image: ${MENSA_REGISTRY:-ghcr.io/adportfolionode}/mensa-backend:${MENSA_VERSION:-latest}
    container_name: mensa_backend
    environment: *backend-environment
    volumes:
      - backend_data:/data
    networks:
      - mensa-net
    depends_on:
      chroma:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; socket.create_connection(('127.0.0.1', 5000), timeout=2).close()",
        ]
      interval: 15s
      timeout: 8s
      retries: 6
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEMORY_LIMIT:-6G}
    restart: unless-stopped

  frontend:
    image: ${MENSA_REGISTRY:-ghcr.io/adportfolionode}/mensa-frontend:${MENSA_VERSION:-latest}
    container_name: mensa_frontend
    expose:
      - "80"
    networks:
      - mensa-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:0.5.3
    container_name: mensa_chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    expose:
      - "8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - mensa-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # TLS termination + optional subscriber basic auth (recommended for public web)
  caddy:
    image: caddy:2-alpine
    container_name: mensa_caddy
    profiles: ["tls"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH:-}
    volumes:
      - ./deploy/caddy/Caddyfile.${CADDY_PROFILE:-tls}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mensa-net
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped

networks:
  mensa-net:
    driver: bridge

volumes:
  backend_data:
  chroma_data:
  caddy_data:
  caddy_config: