name: Docker Build and Push - Full Stack

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/mensa-frontend:latest
            ghcr.io/${{ github.repository_owner }}/mensa-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=22.13.1

      - name: Image info
        run: |
          echo "Frontend images:"
          echo "ghcr.io/${{ github.repository_owner }}/mensa-frontend:latest"
          echo "ghcr.io/${{ github.repository_owner }}/mensa-frontend:${{ github.sha }}"

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/mensa-backend:latest
            ghcr.io/${{ github.repository_owner }}/mensa-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REQUIREMENTS_FILE=requirements.txt
            CACHE_BUSTER=${{ github.sha }}

      - name: Image info
        run: |
          echo "Backend images:"
          echo "ghcr.io/${{ github.repository_owner }}/mensa-backend:latest"
          echo "ghcr.io/${{ github.repository_owner }}/mensa-backend:${{ github.sha }}"

  test-containers:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test containers
        run: |
          # Pull images
          docker pull ghcr.io/${{ github.repository_owner }}/mensa-frontend:${{ github.sha }}
          docker pull ghcr.io/${{ github.repository_owner }}/mensa-backend:${{ github.sha }}
          
          # Test frontend image
          docker run -d --name test-frontend -p 3000:80 ghcr.io/${{ github.repository_owner }}/mensa-frontend:${{ github.sha }}
          sleep 10
          curl -f http://localhost:3000 || exit 1
          docker stop test-frontend
          docker rm test-frontend
          
          # Test backend image (will fail without ChromaDB, but should start)
          docker run -d --name test-backend -p 5000:5000 \
            -e DATA_DIR=/data \
            -e CHROMA_HOST=localhost \
            -e CHROMA_PORT=8000 \
            ghcr.io/${{ github.repository_owner }}/mensa-backend:${{ github.sha }}
          sleep 15
          curl -f http://localhost:5000/api/health || echo "Backend health check failed (expected without ChromaDB)"
          docker stop test-backend
          docker rm test-backend

  docker-hub-push:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull from GHCR and push to Docker Hub
        run: |
          # Frontend
          docker pull ghcr.io/${{ github.repository_owner }}/mensa-frontend:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/mensa-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/mensa-frontend:latest
          docker tag ghcr.io/${{ github.repository_owner }}/mensa-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/mensa-frontend:${{ github.ref_name }}
          docker push ${{ secrets.DOCKER_USERNAME }}/mensa-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mensa-frontend:${{ github.ref_name }}
          
          # Backend
          docker pull ghcr.io/${{ github.repository_owner }}/mensa-backend:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/mensa-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/mensa-backend:latest
          docker tag ghcr.io/${{ github.repository_owner }}/mensa-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/mensa-backend:${{ github.ref_name }}
          docker push ${{ secrets.DOCKER_USERNAME }}/mensa-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mensa-backend:${{ github.ref_name }}
