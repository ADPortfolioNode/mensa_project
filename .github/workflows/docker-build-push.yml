name: Build & Push Docker Images

on:
  push:
    branches:
      - main
      - mensa
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - mensa

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_ORG: adportfolionode
  FRONTEND_IMAGE: mensa-frontend
  BACKEND_IMAGE: mensa-backend

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: ${{ env.BACKEND_IMAGE }}:test
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          tags: ${{ env.FRONTEND_IMAGE }}:test
          load: true
          build-args: NODE_VERSION=22.13.1
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Test backend image
        run: |
          docker run --rm ${{ env.BACKEND_IMAGE }}:test python -c "import fastapi, hypercorn, chromadb, sklearn; print('All backend imports OK')"

      - name: Test frontend image
        run: |
          docker run --rm ${{ env.FRONTEND_IMAGE }}:test sh -c '[ -f /usr/share/nginx/html/index.html ] && echo "Frontend build OK" || exit 1'

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  push-to-registry:
    name: Push to Docker Hub & GHCR
    needs: build-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_ORG }}/${{ env.FRONTEND_IMAGE }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_ORG }}/${{ env.BACKEND_IMAGE }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: NODE_VERSION=22.13.1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-draft:
    name: Draft Release
    needs: push-to-registry
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release notes
        id: release_notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            cat RELEASE_NOTES.md
          else
            echo "## Release ${{ github.ref_name }}" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "See commit history for details." >> RELEASE_NOTES.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: true
