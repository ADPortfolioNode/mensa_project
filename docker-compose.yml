# =============================================================================
# Mensa Project - Docker Compose Configuration
# =============================================================================
# To use pre-built images instead of building from source:
# 1. Comment out the `build` sections for backend and frontend
# 2. Uncomment the `image` lines with ghcr.io/adportfolionode/mensa-*
# 3. Run: docker compose up -d
# =============================================================================

services:
  backend:
    container_name: mensa_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        CACHE_BUSTER: ${BACKEND_CACHE_BUSTER:-stable}
    ports:
      - "5000:5000"
    environment:
      - DATA_DIR=/data
      - MAX_CONCURRENT_CLONES=3
      - CHROMA_SDK_ENABLED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHAT_GPT_API_KEY=${CHAT_GPT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROK_API_KEY=${GROK_API_KEY}
      - GROK_API_BASE=${GROK_API_BASE:-https://api.x.ai/v1}
      - GROK_MODEL=${GROK_MODEL:-grok-3-mini-beta}
      - CHROMA_HOST=mensa_chroma
      - CHROMA_PORT=8000
      - INGEST_BATCH_SIZE=4000
      - INGEST_REQUEST_TIMEOUT=20
      - INGEST_MAX_RETRIES=2
      - INGEST_RETRY_DELAY=1
      - INGEST_ENABLE_CATALOG_FALLBACK=0
      - INGEST_MAX_CATALOG_CANDIDATES=3
    depends_on:
      chroma:
        condition: service_healthy
    networks:
      - mensa-net
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 22.13.1
    container_name: mensa_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - HOME=/app
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_BASE=http://localhost:5000
    networks:
      - mensa-net
    restart: unless-stopped
  chroma:
    image: chromadb/chroma:0.5.3
    container_name: mensa_chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mensa-net
    restart: on-failure

networks:
  mensa-net:
    driver: bridge

volumes:
  backend_data:
  chroma_data:
